name: tests

on:
  push:
    branches: [main, "**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      R_KEEP_PKG_SOURCE: yes
      # renv-style frozen CRAN snapshot: keeps genetics / haplo.stats / jmvcore
      # at fixed versions so a dependency upgrade never turns the golden tests
      # red on an unrelated push. Bump this date deliberately (and re-verify the
      # golden values) when you want to test against newer packages.
      RSPM: https://packagemanager.posit.co/cran/2026-07-01

    steps:
      - uses: actions/checkout@v4

      - name: Set up R 4.5
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5'
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # Depends (genetics, haplo.stats), Imports (jmvcore, R6, nnet) and
          # Suggests (testthat) are read from DESCRIPTION automatically.
          extra-packages: any::testthat

      - name: Install SNPstats
        run: R CMD INSTALL --no-byte-compile .

      - name: Run test suite
        run: Rscript tests/run_tests.R
