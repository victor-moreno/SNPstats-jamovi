---
title: Basic Genetic Epidemiology Analyses of SNP data
name: SNPstats
version: 0.3.0
jms: '1.0'
authors:
  - Victor Moreno
maintainer: Victor Moreno <v.moreno@iconcologa.net>
date: '2026-04-21'
type: R
description: >
  Performs SNP analysis for genetic epidemiology studies. Computes allele and
  genotype frequencies, Hardy-Weinberg equilibrium tests, SNP-response
  association, linkage disequilibrium, haplotype analysis, and polygenic score
  (PGS) calculation. Based on the SNPstats web tool (https://www.snpstats.net).
analyses:
  - title: SNP Descriptive
    name: snpDesc
    ns: SNPstats
    menuGroup: SNPstats
    menuTitle: SNP Descriptive
    menuSubgroup: Genetic epidemiology
    description: >
      Allele and genotype frequencies, Hardy-Weinberg equilibrium, and covariate
      descriptives. Optionally stratified by response groups.
    category: analyses
  - title: SNP Association Analysis
    name: snpAssoc
    ns: SNPstats
    menuGroup: SNPstats
    menuTitle: SNP Association Analysis
    menuSubgroup: Genetic epidemiology
    description: >
      Association between SNPs and a binary or quantitative response under
      codominant, dominant, recessive, overdominant, and log-additive models.
      Includes optional SNP × covariate interaction tests.
    category: analyses
  - title: LD and Haplotype Analysis
    name: snpLDHaplo
    ns: SNPstats
    menuGroup: SNPstats
    menuTitle: LD and Haplotype Analysis
    menuSubgroup: Genetic epidemiology
    description: >
      Linkage disequilibrium (pairwise table, matrix, heatmap) and haplotype
      frequency estimation and association analysis via haplo.stats.
    category: analyses
  - title: Polygenic Score (PGS)
    name: snpPGS
    ns: SNPstats
    menuGroup: SNPstats
    menuTitle: Polygenic Score (PGS)
    menuSubgroup: Genetic epidemiology
    description: >
      Calculates a Polygenic Risk Score (PGS) for each individual using genotype
      columns (dosage 0/1/2 or allele strings, auto-detected) and a PGS
      Catalog-format weights file (rsID, effect_allele, effect_weight). Outputs
      per-individual scores, Z-scores, percentile ranks, a score distribution
      plot, SNP coverage summary, and optional association with a binary or
      quantitative response variable.
    category: analyses
usesNative: true
minApp: 1.0.8
datasets:
  - name: SNP sample1
    path: sample1.rda
    description: >
      Example SNP dataset 706 individuals, 5 SNPs, case-control status, age,
      sex, BMI
    tags:
      - SNP
      - genetics
  - name: SNP sample2
    path: sample2.rda
    description: Example SNP dataset 566 individuals, 3 SNPs, case-control status
    tags:
      - SNP
      - genetics
  - name: SNP sample3
    path: sample3.rda
    description: >
      Example SNP dataset 706 individuals, 8 SNPs, case-control status, age,
      sex, family history
    tags:
      - SNP
      - genetics
  - name: SNP sample4
    path: sample4.rda
    description: >
      Example SNP dataset 706 individuals, 9 SNPs, case-control status, age,
      sex, diet
    tags:
      - SNP
      - genetics
  - name: SNP sample5
    path: sample5.rda
    description: Example SNP dataset 706 individuals, 4 SNPs, case-control, age, sex
    tags:
      - SNP
      - genetics

...
