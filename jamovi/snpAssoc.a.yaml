---
name: snpAssoc
title: SNP Association Analysis
version: '1.0.0'
jas: '1.2'
menuGroup: SNPstats
menuTitle: SNP Association Analysis

options:
  - name: data
    type: Data
    description:
      main: >
        Association between SNPs and a response variable under multiple genetic
        models, with optional covariate adjustment and interaction testing.
      R:
        dontrun: false
        usage: |
          snpAssoc(
            data = mydata,
            response = "status",
            snps = c("snp1", "snp2"),
            covariates = c("age", "sex"),
            modelCodominant = TRUE,
            modelLogAdditive = TRUE
          )

  # ── Variable assignment ───────────────────────────────────────
  - name: response
    title: Response variable
    type: Variable
    suggested: [nominal, continuous]
    permitted:  [factor, numeric]

  - name: snps
    title: SNPs
    type: Variables
    suggested: [nominal]
    permitted:  [factor, id]

  - name: covariates
    title: Covariates
    type: Variables
    suggested: [nominal, continuous]
    permitted:  [factor, numeric]
    default: ~

  # ── Response type ─────────────────────────────────────────────
  - name: responseType
    title: Response type
    type: List
    options:
      - {title: Auto-detect,           name: auto}
      - {title: Binary (logistic),     name: binary}
      - {title: Quantitative (linear), name: quantitative}
    default: auto

  # ── Genetic models ────────────────────────────────────────────
  - name: snpAssoc
    title: SNP-response association
    type: Bool
    default: true

  - name: modelCodominant
    title: Codominant
    type: Bool
    default: true

  - name: modelDominant
    title: Dominant
    type: Bool
    default: false

  - name: modelRecessive
    title: Recessive
    type: Bool
    default: false

  - name: modelOverdominant
    title: Overdominant
    type: Bool
    default: false

  - name: modelLogAdditive
    title: Log-additive
    type: Bool
    default: false

  # ── Global ───────────────────────────────────────────────
  - name: ciWidth
    title: Confidence interval (%)
    type: Number
    min: 50
    max: 99.9
    default: 95

  - name: showAIC
    title: AIC / BIC
    type: Bool
    default: false

  # ── Interaction ───────────────────────────────────────────────
  - name: snpInteraction
    title: SNP × covariate interaction
    type: Bool
    default: false

  - name: interactionType
    title: Interaction parameterisation
    type: List
    options:
      - {title: "Multiplicative (SNP × covariate)",      name: multiplicative}
      - {title: "Conditional on covariate (SNP | covariate)", name: conditional_on_covar}
      - {title: "Conditional on genotype  (covariate | SNP)",  name: conditional_on_snp}
    default: multiplicative

  - name: showInteractionTable
    title: Show interaction table
    type: Bool
    default: true

  - name: showInteractionAdjVars
    title: Show adjustment covariate parameters
    type: Bool
    default: false

  - name: interactionModelCodominant
    title: Codominant
    type: Bool
    default: true

  - name: interactionModelDominant
    title: Dominant
    type: Bool
    default: false

  - name: interactionModelRecessive
    title: Recessive
    type: Bool
    default: false

  - name: interactionModelOverdominant
    title: Overdominant
    type: Bool
    default: false

  - name: interactionModelLogAdditive
    title: Log-additive
    type: Bool
    default: false

  - name: showStratByCovariate
    title: Stratified analysis by covariate
    type: Bool
    default: false

  - name: showStratByGenotype
    title: Stratified analysis by genotype
    type: Bool
    default: false

  - name: showCrossClassTable
    title: Show cross-classification table
    type: Bool
    default: false

