---
name: snpAssoc
title: SNP Association Analysis
version: '1.0.0'
jas: '1.2'
menuGroup: SNPstats
menuTitle: SNP Association Analysis

options:
  - name: data
    type: Data
    description:
      main: >
        Association between SNPs and a response variable under multiple genetic
        models, with optional covariate adjustment and interaction testing.
      R:
        dontrun: false
        usage: |
          snpAssoc(
            data = mydata,
            response = "status",
            snps = c("snp1", "snp2"),
            covariates = c("age", "sex"),
            modelCodominant = TRUE,
            modelLogAdditive = TRUE
          )

  # ── Variable assignment ───────────────────────────────────────
  - name: response
    title: Response variable
    type: Variable
    suggested: [nominal, continuous]
    permitted:  [factor, numeric]

  - name: snps
    title: SNPs
    type: Variables
    suggested: [nominal]
    permitted:  [factor, id]

  - name: covariates
    title: Covariates
    type: Variables
    suggested: [nominal, continuous]
    permitted:  [factor, numeric]
    default: ~

  # ── Response type ─────────────────────────────────────────────
  - name: responseType
    title: Response type
    type: List
    options:
      - {title: Auto-detect,           name: auto}
      - {title: Binary (logistic),     name: binary}
      - {title: Quantitative (linear), name: quantitative}
    default: auto

  # ── Genetic models ────────────────────────────────────────────
  - name: snpAssoc
    title: SNP-response association
    type: Bool
    default: true

  - name: modelCodominant
    title: Codominant
    type: Bool
    default: false

  - name: modelDominant
    title: Dominant
    type: Bool
    default: false

  - name: modelRecessive
    title: Recessive
    type: Bool
    default: false

  - name: modelOverdominant
    title: Overdominant
    type: Bool
    default: false

  - name: modelLogAdditive
    title: Log-additive
    type: Bool
    default: false

  - name: ciWidth
    title: Confidence interval (%)
    type: Number
    min: 50
    max: 99.9
    default: 95

  - name: showAIC
    title: Show AIC / BIC
    type: Bool
    default: false

  # ── Interaction ───────────────────────────────────────────────
  - name: snpInteraction
    title: SNP × covariate interaction
    type: Bool
    default: false

  # Genetic model used for interaction analysis.
  # Implemented as a single-select List now; the fill functions
  # already build a `models` vector, so switching to multi-select
  # in the future only requires expanding this option type and
  # rebuilding that vector from the new option.
  - name: interactionModel
    title: Genetic model for interaction
    type: List
    options:
      - {title: Codominant,   name: codominant}
      - {title: Dominant,     name: dominant}
      - {title: Recessive,    name: recessive}
      - {title: Overdominant, name: overdominant}
      - {title: Log-additive, name: logadditive}
    default: logadditive

  - name: showStratByResponse
    title: Stratified analysis by response category
    type: Bool
    default: false

  - name: showStratByGenotype
    title: Stratified analysis by genotype
    type: Bool
    default: false
