title: LD and Haplotype Analysis
name: snpLDHaplo
jus: '3.0'
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Response variable
        children:
          - type: VariablesListBox
            name: response
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: SNPs
        children:
          - type: VariablesListBox
            name: snps
            isTarget: true
      - type: TargetLayoutBox
        label: Covariates
        children:
          - type: VariablesListBox
            name: covariates
            isTarget: true

  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: responseType
        enable: (response)

  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:

      # ── Column 0: Linkage disequilibrium ──────────────────────
      - type: LayoutBox
        cell:
          column: 0
          row: 0
        stretchFactor: 1
        children:
          - type: Label
            label: Linkage disequilibrium
            enable: (snps)
            children:
              - type: CheckBox
                name: ldAnalysis
                enable: (snps)
              - type: CheckBox
                name: ldMatrix
                enable: (snps)
                children:
                  - type: ComboBox
                    name: ldMetric
                    enable: (ldMatrix)
              - type: CheckBox
                name: ldPlot
                enable: (snps)

      # ── Next Row: Haplotype analysis ──────────────────────────
      - type: LayoutBox
        cell:
          column: 0
          row: 1
        stretchFactor: 1
        children:
          - type: Label
            label: Haplotype analysis
            children:
              - type: CheckBox
                name: haploFreq
                enable: (snps)
                children:
                  - type: TextBox
                    name: haploFreqMin
                    format: number
                    enable: (haploFreq)
                  - type: CheckBox
                    name: subpop
                    enable: (response)

              - type: CheckBox
                name: haploAssoc
                enable: (response && snps)
                children:
                  - type: TextBox
                    name: ciWidth
                    format: number
                    enable: (haploAssoc)
              - type: CheckBox
                name: haploInteraction
                enable: (haploAssoc && covariates)
                children:
                  - type: ComboBox
                    name: haploInteractionType
                    enable: (haploInteraction)
