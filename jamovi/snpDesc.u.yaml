title: SNP Descriptive
name: snpDesc
jus: '3.0'
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Response variable
        children:
          - type: VariablesListBox
            name: response
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: SNPs
        children:
          - type: VariablesListBox
            name: snps
            isTarget: true
      - type: TargetLayoutBox
        label: Covariates
        children:
          - type: VariablesListBox
            name: covariates
            isTarget: true

  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: responseType
        enable: (response)
      - type: CheckBox
        name: subpop
        enable: (response)
      - type: CheckBox
        name: covDesc
        enable: (covariates)
        children:
        - type: CheckBox
          name: rmSnpMissing
          enable: (covDesc)

  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:
      - type: Label
        label: SNP descriptive
        enable: (snps)
        children:
          - type: CheckBox
            name: snpSummary
            enable: (snps)
          - type: CheckBox
            name: allFreq
            enable: (snps)
          - type: CheckBox
            name: genoFreq
            enable: (snps)
          - type: CheckBox
            name: hweTest
            enable: (snps)
          - type: CheckBox
            name: showMissing
            enable: (snps)
          - type: CheckBox
            name: showMissingnessPlot
            label: SNP missingness plot
            enable: (snps)
            children:
              - type: TextBox
                name: missingnessThreshold
                label: 'Show SNPs with missingness above (%):'
                format: number
                width: small
                enable: (showMissingnessPlot)
