# snpPGS.r.yaml  — Results definition for SNPstats PGS module
---
name: snpPGS
title: Polygenic Score (PGS)
refs: SNPstats
jrs: '1.1'

items:
  # ── Validation / info messages ─────────────────────────────────────────────
  - name: validationMsg
    title: ''
    type: Html
    visible: false

  # ── SNP grid as actually used for scoring (reflects user edits) ────────────
  - name: snpGridTable
    title: SNP Weights Used for Scoring
    type: Table
    visible: (showCoverage)
    clearWith:
        - snpCols
        - snpGrid
        - weightMode
        - weightsPath
    columns:
        - name: rsid
          title: SNP (rsID / column)
          type: text
        - name: chr
          title: Chr
          type: text
        - name: pos
          title: Position
          type: text
        - name: effect_allele
          title: Effect allele
          type: text
        - name: other_allele
          title: Other allele
          type: text
        - name: effect_weight
          title: Weight used
          type: number
          format: zto
        - name: matched
          title: In dataset
          type: text

  # ── Coverage summary ────────────────────────────────────────────────────────
  - name: coverageTable
    title: SNP Coverage Summary
    type: Table
    visible: (showCoverage)
    rows: 1
    clearWith:
        - snpCols
        - snpGrid
        - weightMode
        - weightsPath
    columns:
        - name: pgs_id
          title: PGS ID
          type: text
        - name: pgs_name
          title: Score name
          type: text
        - name: trait_reported
          title: Trait
          type: text
        - name: weight_type
          title: Weight type
          type: text
        - name: genome_build
          title: Build
          type: text
        - name: snpsInWeights
          title: SNPs in weights file
          type: integer
        - name: snpsInData
          title: SNPs in dataset
          type: integer
        - name: snpsMatched
          title: Matched
          type: integer
        - name: pctMatched
          title: "% matched"
          type: number
          format: pc
        - name: snpsAmbiguous
          title: Ambiguous (AT/CG)
          type: integer
        - name: missingStrategy
          title: Missing strategy
          type: text
        - name: weightMode
          title: Weight mode
          type: text

  # ── PGS summary statistics ──────────────────────────────────────────────────
  - name: summaryTable
    title: PGS Summary Statistics
    type: Table
    rows: 1
    clearWith:
        - snpCols
        - snpGrid
        - weightMode
        - missingStrategy
        - normalize
    columns:
        - name: n
          title: N
          type: integer
        - name: mean
          title: Mean
          type: number
          format: zto
        - name: sd
          title: SD
          type: number
          format: zto
        - name: min
          title: Min
          type: number
          format: zto
        - name: max
          title: Max
          type: number
          format: zto
        - name: skew
          title: Skewness
          type: number
          format: zto

  # ── Per-individual scores ───────────────────────────────────────────────────
  - name: scoreTable
    title: Per-Individual Scores
    type: Table
    visible: (showScoreTable)
    clearWith:
        - snpCols
        - snpGrid
        - weightMode
        - missingStrategy
        - normalize
    columns:
        - name: individual
          title: Individual
          type: text
        - name: pgs
          title: PGS Score
          type: number
          format: zto
        - name: pgs_z
          title: Z-score
          type: number
          format: zto
        - name: percentile
          title: Percentile
          type: number
          format: zto
          visible: (showPercentiles)

  # ── Percentile thresholds ───────────────────────────────────────────────────
  - name: percentileTable
    title: Percentile Thresholds
    type: Table
    visible: (showPercentiles)
    clearWith:
        - snpCols
        - snpGrid
        - weightMode
        - missingStrategy
        - normalize
        - percentileBreaks
    columns:
        - name: threshold
          title: Percentile
          type: text
        - name: score
          title: PGS Score
          type: number
          format: zto

  # ── PGS–response association ────────────────────────────────────────────────
  - name: assocTable
    title: PGS–Response Association
    type: Table
    visible: (showAssoc)
    rows: 1
    clearWith:
        - snpCols
        - snpGrid
        - weightMode
        - missingStrategy
        - normalize
        - responseCol
    columns:
        - name: responseVar
          title: Response
          type: text
        - name: model
          title: Model
          type: text
        - name: beta
          title: β (or log-OR)
          type: number
          format: zto
        - name: se
          title: SE
          type: number
          format: zto
        - name: stat
          title: Statistic
          type: number
          format: zto
        - name: p
          title: p-value
          type: number
          format: zto,pvalue

  # ── Distribution plot ───────────────────────────────────────────────────────
  - name: distPlot
    title: Score Distribution
    type: Image
    visible: (showDistPlot)
    width: 560
    height: 390
    renderFun: .plotDist
