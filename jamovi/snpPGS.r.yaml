# snpPGS_r.yaml  — Results definition for SNPstats PGS module
---
name: snpPGS
title: Polygenic Score (PGS)
refs: SNPstats
jrs: '1.1'

items:
  # ── Validation / info messages ─────────────────────────────────────────────
  - name: validationMsg
    title: ''
    type: Html
    visible: false

  # ── SNP weights as loaded from file ───────────────────────────────────────
  - name: snpGridTable
    title: SNP Weights Used for Scoring
    type: Table
    visible: (showCoverage)
    clearWith:
        - snpCols
        - weightsPath
        - weightingMode
    columns:
        - name: rsid
          title: SNP
          type: text
        - name: chr
          title: Chr
          type: text
          format: narrow
        - name: pos
          title: Position
          type: text
        - name: effect_allele
          title: Effect allele
          type: text
          format: narrow
        - name: other_allele
          title: Other allele
          type: text
          format: narrow
        - name: effect_weight
          title: Weight
          type: number
          format: zto
        - name: matched
          title: In dataset
          type: text
        - name: allele_status
          title: Allele QC
          type: text
        - name: n_missing
          title: "N missing"
          type: integer
        - name: pct_missing
          title: "% missing"
          type: number
          format: zto
        - name: effect_af
          title: "Effect AF"
          type: number
          format: zto
        - name: hwe_p
          title: "HWE p"
          type: number
          format: zto,pvalue
        - name: extra_cols
          title: Extra fields
          type: text

  # ── Coverage summary (key-value rows) ─────────────────────────────────────
  - name: coverageTable
    title: SNP Coverage Summary
    type: Table
    visible: (showCoverage)
    clearWith:
        - snpCols
        - weightsPath
        - weightingMode
    columns:
        - name: field
          title: ''
          type: text
        - name: value
          title: ''
          type: text

  # ── PGS summary statistics ──────────────────────────────────────────────────
  - name: summaryTable
    title: PGS Summary Statistics
    type: Table
    clearWith:
        - snpCols
        - weightsPath
        - weightingMode
        - missingStrategy
        - normalize
        - standardize
        - responseCol
        - covCols
    columns:
        - name: score_type
          title: Score type
          type: text
        - name: group
          title: Group
          type: text
        - name: n
          title: N
          type: integer
        - name: mean
          title: Mean
          type: number
          format: zto
        - name: sd
          title: SD
          type: number
          format: zto
        - name: ci_low
          title: 95% CI low
          type: number
          format: zto
        - name: ci_high
          title: 95% CI high
          type: number
          format: zto
        - name: min
          title: Min
          type: number
          format: zto
        - name: max
          title: Max
          type: number
          format: zto
        - name: skew
          title: Skewness
          type: number
          format: zto

  # ── Save scores to data ─────────────────────────────────────────────────────
  - name: saveScores
    title: PGS Scores
    type: Output
    initInRun: true
    clearWith:
        - snpCols
        - weightsPath
        - weightingMode
        - missingStrategy
        - normalize
        - standardize

  # ── Percentile thresholds ───────────────────────────────────────────────────
  - name: percentileTable
    title: Percentile Thresholds
    type: Table
    visible: (showPercentiles)
    clearWith:
        - snpCols
        - weightsPath
        - weightingMode
        - missingStrategy
        - normalize
        - standardize
        - percentileBreaks
    columns:
        - name: threshold
          title: Percentile
          type: text

  # ── PGS–response association ────────────────────────────────────────────────
  - name: assocTable
    title: PGS–Response Association
    type: Table
    visible: (showAssoc)
    clearWith:
        - snpCols
        - weightsPath
        - weightingMode
        - missingStrategy
        - normalize
        - standardize
        - responseCol
        - covCols
    columns:
        - name: score_type
          title: Score type
          type: text
        - name: test
          title: Test
          type: text
        - name: stat_label
          title: Statistic
          type: text
        - name: estimate
          title: Estimate
          type: number
          format: zto
        - name: se
          title: SE
          type: number
          format: zto
        - name: ci_low
          title: 95% CI low
          type: number
          format: zto
        - name: ci_high
          title: 95% CI high
          type: number
          format: zto
        - name: stat
          title: Value
          type: number
          format: zto
          visible: false
        - name: df
          title: df
          type: text
          visible: false
        - name: se
          title: SE
          type: number
          format: zto
          visible: false
        - name: p
          title: p-value
          type: number
          format: zto,pvalue
    notes:
        covNote: ''
        respNote: ''

  # ── PGS × covariate interaction ────────────────────────────────────────────
  - name: interactionTable
    title: PGS × Covariate Interaction
    type: Table
    visible: (showInteraction)
    clearWith:
        - snpCols
        - weightsPath
        - weightingMode
        - missingStrategy
        - normalize
        - standardize
        - responseCol
        - covCols
    columns:
        - name: score_type
          title: Score type
          type: text
        - name: model
          title: Model
          type: text
        - name: term
          title: Term
          type: text
        - name: estimate
          title: Estimate
          type: number
          format: zto
        - name: ci_low
          title: 95% CI low
          type: number
          format: zto
        - name: ci_high
          title: 95% CI high
          type: number
          format: zto
        - name: p
          title: p-value
          type: number
          format: zto,pvalue
    notes:
        intNote: ''

  # ── Distribution plot ───────────────────────────────────────────────────────
  - name: distPlot
    title: Score Distribution
    type: Image
    visible: (showDistPlot)
    width: 560
    height: 390
    renderFun: .plotDist

  # ── Stratified plot (visible when response variable is set) ───────────────
  - name: stratPlot
    title: PGS by Group
    type: Image
    visible: false
    width: 560
    height: 420
    renderFun: .plotStrat
