# snpPGS.u.yaml  — UI layout for SNPstats PGS module
---
name: snpPGS
title: Polygenic Score (PGS)
jus: "3.0"
compilerMode: tame
events:
  update: ./snpPGS.events::update

children:
    # ── Variable targets ────────────────────────────────────────────────────
    - type: VariableSupplier
      persistentItems: false
      stretchFactor: 1
      children:
          - type: TargetLayoutBox
            label: SNP columns (genotype data)
            children:
                - type: VariablesListBox
                  name: snpCols
                  isTarget: true
                  events:
                      change: ./snpPGS.events::onChange_snpCols

          - type: TargetLayoutBox
            label: Individual ID (optional)
            children:
                - type: VariablesListBox
                  name: idCol
                  isTarget: true
                  maxItemCount: 1

          - type: TargetLayoutBox
            label: Response variable (optional)
            children:
                - type: VariablesListBox
                  name: responseCol
                  isTarget: true
                  maxItemCount: 1

    # ── Weights file ─────────────────────────────────────────────────────────
    - type: LayoutBox
      margin: large
      children:
          - type: Label
            label: Weights File
            children:
                - type: TextBox
                  name: weightsPath
                  label: "PGS Catalog weights file (.csv / .txt / .tsv):"
                  format: string
                  width: largest
                  events:
                      change: ./snpPGS.events::onChange_weightsPath

                - type: ComboBox
                  name: weightsSep
                  label: Delimiter
                  events:
                      change: ./snpPGS.events::onChange_weightsSep

    # ── SNP Weights Grid ─────────────────────────────────────────────────────
    # The grid shows one row per SNP (matched from file or added from snpCols).
    # Columns: rsid (read-only label), chr / pos (read-only), effect_allele,
    # other_allele, effect_weight — the last three are user-editable.
    # ─────────────────────────────────────────────────────────────────────────
    - type: LayoutBox
      margin: large
      children:
          - type: Label
            label: SNP Weights Grid
            children:
                - type: LayoutBox
                  margin: small
                  children:
                      - type: ComboBox
                        name: weightMode
                        label: "Scoring weights:"

                - type: Label
                  label: >
                      Edit effect allele, other allele, or weight directly in
                      the table. Changes are reflected immediately in the results.

                - type: ListBox
                  name: snpGrid
                  showColumnHeaders: true
                  height: large
                  stretchFactor: 1
                  columns:
                      - name: rsid
                        label: SNP / rsID
                        selectable: false
                        stretchFactor: 1.2
                        template:
                            type: VariableLabel

                      - name: chr
                        label: Chr
                        selectable: false
                        stretchFactor: 0.4
                        maxWidth: 50
                        template:
                            type: Label

                      - name: pos
                        label: Position
                        selectable: false
                        stretchFactor: 0.7
                        maxWidth: 80
                        template:
                            type: Label

                      - name: effect_allele
                        label: Effect
                        stretchFactor: 0.4
                        maxWidth: 55
                        template:
                            type: TextBox
                            format: string

                      - name: other_allele
                        label: Other
                        stretchFactor: 0.4
                        maxWidth: 55
                        template:
                            type: TextBox
                            format: string

                      - name: effect_weight
                        label: Weight
                        stretchFactor: 0.5
                        maxWidth: 70
                        template:
                            type: TextBox
                            format: number

    # ── Scoring options ──────────────────────────────────────────────────────
    - type: LayoutBox
      margin: large
      children:
          - type: Label
            label: Scoring Options
            children:
                - type: ComboBox
                  name: missingStrategy
                  label: Missing genotype handling

                - type: CheckBox
                  name: normalize
                  label: Normalize score by number of matched SNPs

    # ── Output options ───────────────────────────────────────────────────────
    - type: LayoutBox
      margin: large
      stretchFactor: 1
      children:
          - type: Label
            label: Output
            children:
                - type: CheckBox
                  name: showCoverage
                  label: SNP coverage summary

                - type: CheckBox
                  name: showScoreTable
                  label: Per-individual score table

                - type: CheckBox
                  name: showDistPlot
                  label: Score distribution plot

                - type: CheckBox
                  name: showPercentiles
                  label: Percentile ranks
                  children:
                      - type: TextBox
                        name: percentileBreaks
                        label: "Percentile thresholds (comma-separated):"
                        format: string
                        enable: (showPercentiles)

                - type: CheckBox
                  name: showAssoc
                  label: PGS-response association test
                  enable: (responseCol)
