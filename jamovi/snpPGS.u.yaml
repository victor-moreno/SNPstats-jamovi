name: snpPGS
title: Polygenic Score (PGS)
jus: '3.0'
compilerMode: developer
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: SNP columns (genotype data)
        children:
          - type: VariablesListBox
            name: snpCols
            isTarget: true
      - type: TargetLayoutBox
        label: Covariates (optional)
        children:
          - type: VariablesListBox
            name: covCols
            isTarget: true
      - type: TargetLayoutBox
        label: Response variable (optional)
        children:
          - type: VariablesListBox
            name: responseCol
            isTarget: true
            maxItemCount: 1
  - type: LayoutBox
    margin: large
    children:
      - type: Label
        label: Weights File
        children:
          - type: ComboBox
            name: weightingMode
            label: SNP weighting mode
          - type: TextBox
            name: weightsPath
            label: 'PGS Catalog weights file (.csv / .txt / .tsv / .txt.gz):'
            format: string
            width: largest
            enable: (weightingMode != 'unweighted')
  - type: LayoutBox
    margin: large
    children:
      - type: Label
        label: Scoring Options
        children:
          - type: ComboBox
            name: missingStrategy
            label: Missing genotype handling
          - type: CheckBox
            name: normalize
            label: Normalize score (divide by maximum possible)
          - type: CheckBox
            name: standardize
            label: Standardize score (divide by SD, for 1-SD model estimates)
  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:
      - type: Label
        label: Output
        children:
          - type: CheckBox
            name: showCoverage
            label: SNP coverage summary
          - type: CheckBox
            name: showDistPlot
            label: Score distribution plot
          - type: CheckBox
            name: showPercentiles
            label: Percentile ranks
            children:
              - type: TextBox
                name: percentileBreaks
                label: 'Percentile thresholds (comma-separated):'
                format: string
                enable: (showPercentiles)
          - type: CheckBox
            name: showAssoc
            label: PGS-response association test
            enable: (responseCol)
      - type: LayoutBox
        margin: large
        children:
          - type: Output
            name: saveScores
