name: snpPGS
title: Polygenic Score (PGS)
jus: '3.0'
compilerMode: developer
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: SNP columns (genotype data)
        children:
          - type: VariablesListBox
            name: snpCols
            isTarget: true
      - type: TargetLayoutBox
        label: Covariates (optional)
        children:
          - type: VariablesListBox
            name: covCols
            isTarget: true
      - type: TargetLayoutBox
        label: Response variable (optional)
        children:
          - type: VariablesListBox
            name: responseCol
            isTarget: true
            maxItemCount: 1
  - type: LayoutBox
    margin: large
    children:
      - type: Label
        label: Weights
        children:
          - type: ComboBox
            name: weightingMode
            label: SNP weighting mode
          - type: TextBox
            name: weightsPath
            label: 'Weights file (PGS catalog format):'
            format: string
            width: largest
          - type: CheckBox
            name: scaleWeights
            label: Scale file weights to unit mean (comparable to unweighted)
          - type: CheckBox
            name: showCoverage
            label: SNP coverage summary
            style: inline
            children:
              - type: CheckBox
                name: filterValidSnps
                label: Exclude invalid SNPs

  - type: LayoutBox
    margin: large
    children:
      - type: Label
        label: 'SNP QC: exclude SNPs'
        children:
          - type: CheckBox
            name: qcFilterMissing
            label: Missingness >
            style: inline
            children:
              - type: TextBox
                name: qcMaxMissingPct
                label: ''
                format: number
                width: small
                suffix: '%'
          - type: CheckBox
            name: qcFilterHwe
            label: HWE p-value <
            style: inline
            children:
              - type: TextBox
                name: qcHweP
                label: ''
                format: number
                width: normal
                suffix: 'in controls if binary response'

  - type: LayoutBox
    margin: large
    children:
      - type: Label
        label: Scoring Options
        children:
          - type: CheckBox
            name: missingCorrection
            label: Correct for missing genotypes
          - type: ComboBox
            name: missingStrategy
            label: Missing genotype handling
          - type: ComboBox
            name: scaleMethod
            label: Score rescaling
          - type: TextBox
            name: scaleFactor
            label: 'Scale factor / N alleles:'
            format: number
            width: small
            enable: (scaleMethod:multiply || scaleMethod:perNAlleles)
          - type: CheckBox
            name: standardize
            label: Standardize score (SD = 1)
  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:
      - type: Label
        label: Analysis
        children:
          - type: CheckBox
            name: showAssoc
            label: PGS - response association test
            enable: (responseCol)
          - type: CheckBox
            name: showPercentiles
            label: PGS - Percentile category analysis
            children:
              - type: TextBox
                name: percentileBreaks
                label: 'Percentile thresholds:'
                format: string
                width: largest
                enable: (showPercentiles)
              - type: ComboBox
                name: pgsRefCategory
                label: 'Reference category:'
                enable: (showPercentiles)
          - type: CheckBox
            name: showInteraction
            label: PGS × covariate interaction
            enable: (responseCol && covCols)

  - type: CollapseBox
    label: Plots
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: CheckBox
            name: showDistPlot
            label: Score distribution plot
            children:
              - type: ComboBox
                name: distPlotType
                label: 'Plot type:'
                enable: (showDistPlot)
              - type: TextBox
                name: histBreaks
                label: 'Histogram bins:'
                format: number
                width: small
                enable: (showDistPlot && (distPlotType:histogram || distPlotType:both))
  - type: CollapseBox
    label: Save
    collapsed: true
    stretchFactor: 1
    children:
      - type: LayoutBox
        margin: large
        stretchFactor: 1
        children:
          - type: Output
            name: saveScores