name: snpPGS
title: Polygenic Score (PGS)
jus: '3.0'
compilerMode: developer
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: SNP columns (genotype data)
        children:
          - type: VariablesListBox
            name: snpCols
            isTarget: true
      - type: TargetLayoutBox
        label: Covariates (optional)
        children:
          - type: VariablesListBox
            name: covCols
            isTarget: true
      - type: TargetLayoutBox
        label: Response variable (optional)
        children:
          - type: VariablesListBox
            name: responseCol
            isTarget: true
            maxItemCount: 1
  - type: LayoutBox
    margin: large
    children:
      - type: Label
        label: Weights File
        children:
          - type: ComboBox
            name: weightingMode
            label: SNP weighting mode
          - type: TextBox
            name: weightsPath
            label: 'Weights file (PGS catalog format):'
            format: string
            width: largest
  - type: LayoutBox
    margin: large
    children:
      - type: Label
        label: Scoring Options
        children:
          - type: ComboBox
            name: missingStrategy
            label: Missing genotype handling
          - type: CheckBox
            name: normalize
            label: Normalize score (max=1)
          - type: CheckBox
            name: standardize
            label: Standardize score (SD=1)
  - type: LayoutBox
    margin: large
    children:
      - type: Label
        label: SNP QC Filters
        children:
          - type: CheckBox
            name: qcFilterMissing
            label: Exclude SNPs with high missingness
            children:
              - type: TextBox
                name: qcMaxMissingPct
                label: 'Max missing (%)'
                format: number
                width: small
                enable: (qcFilterMissing)
          - type: CheckBox
            name: qcFilterHwe
            label: Exclude SNPs failing HWE test
            children:
              - type: TextBox
                name: qcHweP
                label: 'HWE p-value threshold'
                format: number
                width: small
                enable: (qcFilterHwe)

  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:
      - type: Label
        label: Output
        children:
          - type: CheckBox
            name: showCoverage
            label: SNP coverage summary
            children:
              - type: CheckBox
                name: filterValidSnps
                label: Show valid SNPs only
                enable: (showCoverage)
          - type: CheckBox
            name: showDistPlot
            label: Score distribution plot
            children:
              - type: ComboBox
                name: distPlotType
                label: 'Plot type:'
                enable: (showDistPlot)
              - type: TextBox
                name: histBreaks
                label: 'Histogram bins:'
                format: number
                width: small
                enable: (showDistPlot && distPlotType != 'density')
          - type: CheckBox
            name: showPercentiles
            label: Percentile category analysis
            children:
              - type: TextBox
                name: percentileBreaks
                label: 'Percentile thresholds:'
                format: string
                width: largest
                enable: (showPercentiles)
              - type: ComboBox
                name: pgsRefCategory
                label: 'Reference category:'
                enable: (showPercentiles)
          - type: CheckBox
            name: showAssoc
            label: PGS-response association test
            enable: (responseCol)
          - type: CheckBox
            name: showInteraction
            label: PGS × covariate interaction
            enable: (responseCol && covCols)
      - type: LayoutBox
        margin: large
        children:
          - type: Output
            name: saveScores
