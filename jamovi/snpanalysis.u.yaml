title: SNP Analysis
name: snpAnalysis
jus: '3.0'
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Response variable
        children:
          - type: VariablesListBox
            name: response
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: SNPs
        children:
          - type: VariablesListBox
            name: snps
            isTarget: true
      - type: TargetLayoutBox
        label: Covariates
        children:
          - type: VariablesListBox
            name: covariates
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: responseType
      - type: CheckBox
        name: subpop
      - type: CheckBox
        name: covDesc


  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:
      - type: LayoutBox
        cell:
            column: 0
            row: 0
        stretchFactor: 1
        children:
        - type: Label
          label: SNP descriptive
          children:
            - type: CheckBox
              name: allFreq
            - type: CheckBox
              name: genoFreq
            - type: CheckBox
              name: hweTest
            - type: CheckBox
              name: ldAnalysis
              children:
              - type: CheckBox
                name: ldD
              - type: CheckBox
                name: ldDprime
              - type: CheckBox
                name: ldR
              - type: CheckBox
                name: ldPval

      - type: LayoutBox
        cell:
            column: 1
            row: 0
        stretchFactor: 1
        children:
          - type: Label
            label: SNP association
            children:
              - type: CheckBox
                name: snpAssoc
                children:
                - type: CheckBox
                  name: modelCodominant
                - type: CheckBox
                  name: modelDominant
                - type: CheckBox
                  name: modelRecessive
                - type: CheckBox
                  name: modelOverdominant
                - type: CheckBox
                  name: modelLogAdditive
                - type: TextBox
                  name: ciWidth
                  format: number

          - type: Label
            label: Haplotype analysis
            children:
              - type: CheckBox
                name: haploFreq
                children:
                - type: TextBox
                  name: haploFreqMin
                  format: number
              - type: CheckBox
                name: haploAssoc
