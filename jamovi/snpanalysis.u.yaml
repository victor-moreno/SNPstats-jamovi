title: SNP Analysis
name: snpAnalysis
jus: '3.0'
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Response variable
        children:
          - type: VariablesListBox
            name: response
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: SNPs
        children:
          - type: VariablesListBox
            name: snps
            isTarget: true
      - type: TargetLayoutBox
        label: Covariates
        children:
          - type: VariablesListBox
            name: covariates
            isTarget: true

  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: responseType
        enable: (response)
      - type: CheckBox
        name: subpop
        enable: (response)
      - type: CheckBox
        name: covDesc
        enable: (covariates)

  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:

      # ── Column 0: SNP descriptive ──────────────────────────────
      - type: LayoutBox
        cell:
          column: 0
          row: 0
        stretchFactor: 1
        children:
          - type: Label
            label: SNP descriptive
            enable: (snps)
            children:
              - type: CheckBox
                name: snpSummary
                enable: (snps)
              - type: CheckBox
                name: allFreq
                enable: (snps)
              - type: CheckBox
                name: genoFreq
                enable: (snps)
              - type: CheckBox
                name: hweTest
                enable: (snps)

      # ── Column 1: Linkage disequilibrium ──────────────────────
      - type: LayoutBox
        cell:
          column: 0
          row: 1
        stretchFactor: 1
        children:
          - type: Label
            label: Linkage disequilibrium
            enable: (snps)
            children:
              - type: CheckBox
                name: ldAnalysis
                enable: (snps)
              - type: CheckBox
                name: ldMatrix
                enable: (snps)
                children:
                  - type: ComboBox
                    name: ldMetric
                    enable: (snps)
              - type: CheckBox
                name: ldPlot
                enable: (snps)

      # ── Column 2 row 0: SNP association ───────────────────────
      - type: LayoutBox
        cell:
          column: 1
          row: 0
        stretchFactor: 1
        children:
          - type: Label
            label: SNP association
            children:
              - type: CheckBox
                name: snpAssoc
                enable: (response && snps)
                children:
                  - type: CheckBox
                    name: modelCodominant
                    enable: (response && snps)
                  - type: CheckBox
                    name: modelDominant
                    enable: (response && snps)
                  - type: CheckBox
                    name: modelRecessive
                    enable: (response && snps)
                  - type: CheckBox
                    name: modelOverdominant
                    enable: (response && snps)
                  - type: CheckBox
                    name: modelLogAdditive
                    enable: (response && snps)
                  - type: TextBox
                    name: ciWidth
                    format: number
              - type: CheckBox
                name: snpInteraction
                enable: (snpAssoc && covariates)

      # ── Column 2 row 1: Haplotype analysis ────────────────────
      - type: LayoutBox
        cell:
          column: 1
          row: 1
        stretchFactor: 1
        children:
          - type: Label
            label: Haplotype analysis
            children:
              - type: CheckBox
                name: haploFreq
                enable: (snps)
                children:
                  - type: TextBox
                    name: haploFreqMin
                    format: number
              - type: CheckBox
                name: haploAssoc
                enable: (snps)
              - type: CheckBox
                name: haploInteraction
                enable: (snps && covariates)
