---
name: snpDesc
title: SNP Descriptive
version: '0.2.0'
jas: '1.2'
menuGroup: SNPstats
menuTitle: SNP Descriptive

options:
  - name: data
    type: Data
    description:
      main: >
        Allele/genotype frequencies, Hardy-Weinberg equilibrium, and optional
        covariate descriptives, with optional stratification by response group.
      R:
        dontrun: false
        usage: |
          snpDesc(
            data = mydata,
            snps = c("snp1", "snp2"),
            response = "status",
            covariates = c("age", "sex")
          )

  # ── Variable assignment ───────────────────────────────────────
  - name: response
    title: Response variable
    type: Variable
    suggested: [nominal, continuous]
    permitted:  [factor, numeric]
    default: ~

  - name: snps
    title: SNPs
    type: Variables
    suggested: [nominal]
    permitted:  [factor, id]

  - name: covariates
    title: Covariates
    type: Variables
    suggested: [nominal, continuous]
    permitted:  [factor, numeric]
    default: ~

  # ── Response type ─────────────────────────────────────────────
  - name: responseType
    title: Response type
    type: List
    options:
      - {title: Auto-detect,                name: auto}
      - {title: Binary (logistic),          name: binary}
      - {title: Quantitative (linear),      name: quantitative}
      - {title: Categorical,                name: categorical}
    default: auto

  # ── Subpopulation / stratification ───────────────────────────
  - name: subpop
    title: Stratify by response groups
    type: Bool
    default: false

  # ── Covariate descriptives ────────────────────────────────────
  - name: covDesc
    title: Descriptive statistics for covariates
    type: Bool
    default: false

  - name: rmSnpMissing
    title: Remove observations with missing values in SNPs
    type: Bool
    default: false

    # ── SNP descriptives ──────────────────────────────────────────
  - name: snpSummary
    title: SNP summary table
    type: Bool
    default: true

  - name: allFreq
    title: Allele frequencies
    type: Bool
    default: false

  - name: genoFreq
    title: Genotype frequencies
    type: Bool
    default: false

  - name: hweTest
    title: Hardy-Weinberg equilibrium
    type: Bool
    default: false

  - name: showMissing
    title: Show missing values
    type: Bool
    default: false

  - name: showMissingnessPlot
    title: Show SNP missingness plot
    type: Bool
    default: false
    description:
        R: >
            If TRUE, displays a horizontal bar chart of missing genotype
            percentage per SNP. The denominator is the number of individuals
            with complete response and covariate data (the eligible pool).
            When stratification is active, group-specific missing rates are
            overlaid as coloured dots.
