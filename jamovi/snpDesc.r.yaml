---
name: snpDesc
title: SNP Descriptive
jrs: '1.1'
refs:
  - snpstats
  - bioinfo

items:
  - name: validationMsgSNP
    title: ''
    type: Html
    visible: false

  - name: validationMsgGeno
    title: ''
    type: Html
    visible: false

  # ── Covariate descriptives ────────────────────────────────────
  - name: covDescGroup
    title: Covariate Descriptives
    type: Group
    visible: (covDesc)
    items:
      - name: covDescTable
        title: Covariate Summary
        type: Table
        columns:
          - {name: variable,     title: Variable,    type: text}
          - {name: level,        title: Level,       type: text}
          - {name: stat_overall, title: Overall,     type: text}
          - {name: stat_g0,      title: Group 0,     type: text,   visible: false}
          - {name: stat_g1,      title: Group 1,     type: text,   visible: false}
          - {name: stat_g2,      title: Group 2,     type: text,   visible: false}
          - {name: stat_g3,      title: Group 3,     type: text,   visible: false}
          - {name: stat_g4,      title: Group 4,     type: text,   visible: false}
          - {name: stat_g5,      title: Group 5,     type: text,   visible: false}
          - {name: stat_g6,      title: Group 6,     type: text,   visible: false}
          - {name: stat_g7,      title: Group 7,     type: text,   visible: false}
          - {name: pval,         title: P-value,     type: number, format: zto, visible: false}

  # ── SNP summary ───────────────────────────────────────────────
  - name: snpSummaryTablesGroup
    title: SNP Descriptive
    type: Group
    visible: (snpSummary || allFreq || genoFreq || hweTest)
    items:
      - name: snpSummaryTable
        title: SNP Summary Table
        type: Table
        visible: (snpSummary)
        columns:
          - {name: snp,        title: SNP,           type: text}
          - {name: alleles,    title: Alleles (A/B),  type: text}
          - {name: group,      title: Group,          type: text}
          - {name: n,          title: N,              type: integer}
          - {name: missing,    title: Missing,        type: integer}
          - {name: maf,        title: MAF (B),        type: number, format: zto}
          - {name: genoCounts, title: AA / AB / BB,   type: text}
          - {name: hwePval,    title: HWE p-value,    type: number, format: zto}

  # ── Per-SNP results ───────────────────────────────────────────
  - name: snpResults
    title: SNP Results
    type: Array
    description: Per-SNP descriptive results
    template:
      title: $key
      type: Group
      items:
        - name: typingRate
          title: ''
          type: Html
          visible: (allFreq || genoFreq || hweTest)

        - name: allFreqTable
          title: Allele Frequencies
          type: Table
          visible: (allFreq)
          columns:
            - {name: allele, title: Allele,  type: text}
            - {name: stat,   title: 'N (%)', type: text}
 
        - name: genoFreqTable
          title: Genotype Frequencies
          type: Table
          visible: (genoFreq)
          columns:
            - {name: genotype,     title: Genotype,          type: text}
            - {name: stat,   title: 'N (%)', type: text}
            - {name: responseStat, title: Response (mean±SE), type: text,   visible: false}

        - name: hweTable
          title: Hardy-Weinberg Equilibrium
          type: Table
          visible: (hweTest)
          columns:
            - {name: group,   title: Group,   type: text}
            - {name: n11,     title: AA,     type: integer}
            - {name: n12,     title: AB,     type: integer}
            - {name: n22,     title: BB,     type: integer}
            - {name: missing, title: Missing, type: integer, visible: false}
            - {name: pval,    title: P-value, type: number,  format: zto}

  # ── SNP missingness plot ──────────────────────────────────────────────────
  - name: missingnessPlot
    title: SNP Missingness
    type: Image
    visible: false
    width: 560
    height: 400
    renderFun: .plotMissingness
    clearWith:
        - snps
        - response
        - covariates
        - subpop
