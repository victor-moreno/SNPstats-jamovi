---
name: snpAnalysis
title: SNP Analysis
jrs: '1.1'

items:  
  - name: validationMsgSNP
    title: ''
    type: Html
    visible: false
  - name: validationMsgGeno
    title: ''
    type: Html
    visible: false
  - name: validationMsg
    title: ''
    type: Html
    visible: false

  # ── Covariate descriptives ─────────────────────────────────────
  - name: covDescGroup
    title: Covariate Descriptives
    type: Group
    visible: (covDesc)
    items:
      - name: covDescTable
        title: Covariate Summary
        type: Table
        columns:
          - name: variable
            title: Variable
            type: text
          - name: level
            title: Level
            type: text
          - name: stat_overall
            title: Overall
            type: text
          - name: stat_g0
            title: Group 0
            type: text
            visible: false
          - name: stat_g1
            title: Group 1
            type: text
            visible: false
          - name: pval
            title: P-value
            type: number
            format: zto,pvalue
            visible: false

  # ── SNP summary table ─────────────────────────────────────────
  - name: snpSummaryTablesGroup
    title: SNP Descriptive
    type: Group
    visible: (snpSummary || allFreq || genoFreq || hweTest)
    items:
      - name: snpSummaryTable
        title: SNP Summary Table
        type: Table
        visible: (snpSummary)
        columns:
          - name: snp
            title: SNP
            type: text
          - name: alleles
            title: Alleles (A/B)
            type: text
          - name: group
            title: Group
            type: text
          - name: n
            title: N
            type: integer
          - name: missing
            title: Missing
            type: integer
          - name: maf
            title: MAF (B)
            type: number
            format: zto,dp=3
          - name: genoCounts
            title: AA / AB / BB
            type: text
          - name: hwePval
            title: HWE p-value
            type: number
            format: zto,pvalue

  # ── Per-SNP results (array) ────────────────────────────────────
  - name: snpResults
    title: SNP Results
    type: Array
    description: Results for each SNP
    template:
      title: $key
      type: Group
      items:
        - name: typingRate
          title: ''
          type: Html
          visible: (allFreq || genoFreq || hweTest)

        - name: allFreqTable
          title: Allele Frequencies
          type: Table
          visible: (allFreq)
          columns:
            - name: allele
              title: Allele
              type: text
            - name: count
              title: N
              type: integer
            - name: prop
              title: '%'
              type: number
              format: dp=1

        - name: genoFreqTable
          title: Genotype Frequencies
          type: Table
          visible: (genoFreq)
          columns:
            - name: genotype
              title: Genotype
              type: text
            - name: count
              title: N
              type: integer
            - name: prop
              title: '%'
              type: number
              format: dp=1
            - name: responseStat
              title: Response (mean ± SE)
              type: text
              visible: false

        - name: hweTable
          title: Hardy-Weinberg Equilibrium
          type: Table
          visible: (hweTest)
          columns:
            - name: group
              title: Group
              type: text
            - name: n11
              title: N11
              type: integer
            - name: n12
              title: N12
              type: integer
            - name: n22
              title: N22
              type: integer
            - name: pval
              title: P-value
              type: number
              format: zto,pvalue

  # ── Per-SNP results (array) ────────────────────────────────────
        - name: validationMsgSNPass
          title: ''
          type: Html
          visible: false

        - name: assocTable
          title: Association with Response
          type: Table
          visible: (snpAssoc && (modelCodominant || modelDominant || modelRecessive || modelOverdominant || modelLogAdditive))
          columns:
            - name: model
              title: Model
              type: text
            - name: comparison
              title: Comparison
              type: text
            - name: effect
              title: OR / β
              type: number
            - name: ciLow
              title: Lower CI
              type: number
            - name: ciHigh
              title: Upper CI
              type: number
            - name: pval
              title: P-value
              type: number
              format: zto,pvalue
            - name: AIC
              title: AIC
              type: number
              format: zto,dp=2

        - name: interactionTable
          title: SNP × Covariate Interaction
          type: Table
          visible: (snpInteraction && (modelCodominant || modelDominant || modelRecessive || modelOverdominant || modelLogAdditive))
          columns:
            - name: model
              title: Model
              type: text
            - name: term
              title: Term
              type: text
            - name: effect
              title: OR / β
              type: number
            - name: ciLow
              title: Lower CI
              type: number
            - name: ciHigh
              title: Upper CI
              type: number
            - name: pval
              title: P-value
              type: number
              format: zto,pvalue
            - name: pvalInteraction
              title: P (interaction)
              type: number
              format: zto,pvalue
            - name: AIC
              title: AIC
              type: number
              format: zto,dp=2

  # ── Linkage disequilibrium ─────────────────────────────────────
  - name: ldGroup
    title: Linkage Disequilibrium
    type: Group
    visible: (ldAnalysis || ldMatrix || ldPlot)
    items:
      - name: ldTable
        title: Pairwise LD
        type: Table
        visible: (ldAnalysis)
        columns:
          - name: snp1
            title: SNP 1
            type: text
          - name: snp2
            title: SNP 2
            type: text
          - name: r2
            title: r²
            type: number
            format: zto
          - name: Dprime
            title: D'
            type: number
            format: zto
          - name: D
            title: D
            type: number
            format: zto
          - name: pval
            title: P-value
            type: number
            format: zto,pvalue

      - name: ldMatrixTable
        title: LD Matrix
        type: Table
        visible: (ldMatrix)
        columns:
          - name: snp
            title: SNP
            type: text

      - name: ldPlotImage
        title: LD Heatmap
        type: Image
        visible: (ldPlot)
        renderFun: .render_ld_plot
        width: 500
        height: 450

  # ── Haplotype frequencies ──────────────────────────────────────
  - name: haploGroup
    title: Haplotype Analysis
    type: Group
    visible: (haploFreq || haploAssoc)
    items:
      - name: haploFreqTable
        title: Haplotype Frequencies
        type: Table
        visible: (haploFreq)
        columns:
          - name: haplotype
            title: Haplotype
            type: text
          - name: freq
            title: Frequency
            type: number
            format: zto
          - name: freq_g0
            title: Group 0
            type: number
            format: zto
            visible: false
          - name: freq_g1
            title: Group 1
            type: number
            format: zto
            visible: false

      - name: haploAssocTable
        title: Haplotype Association
        type: Table
        visible: (haploAssoc)
        columns:
          - name: haplotype
            title: Haplotype
            type: text
          - name: freq
            title: Frequency
            type: number
            format: zto
          - name: effect
            title: OR / β
            type: number
          - name: ciLow
            title: Lower CI
            type: number
          - name: ciHigh
            title: Upper CI
            type: number
          - name: pval
            title: P-value
            type: number
            format: zto,pvalue

      - name: haploInteractionTable
        title: Haplotype × Covariate Interaction
        type: Table
        visible: (haploInteraction)
        columns:
          - name: term
            title: Term
            type: text
          - name: effect
            title: OR / β
            type: number
          - name: ciLow
            title: Lower CI
            type: number
          - name: ciHigh
            title: Upper CI
            type: number
          - name: pval
            title: P-value
            type: number
            format: zto,pvalue
