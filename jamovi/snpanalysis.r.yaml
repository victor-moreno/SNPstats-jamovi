---
name: snpAnalysis
title: SNP Analysis
jrs: '1.1'

items:
  - name: validationMsg
    title: ''
    type: Html
    visible: true

  # ── Covariate descriptives ─────────────────────────────────────
  - name: covDescGroup
    title: Covariate Descriptives
    type: Group
    visible: (covDesc)
    items:
      - name: covDescTable
        title: Covariate Summary
        type: Table
        columns:
          - name: variable
            title: Variable
            type: text
          - name: level
            title: Level
            type: text
          - name: n
            title: n
            type: integer
          - name: stat
            title: Statistic
            type: text

  # ── Per-SNP results (array) ────────────────────────────────────
  - name: snpResults
    title: SNP Results
    type: Array
    description: Results for each SNP
    template:
      title: $key
      type: Group
      items:

        - name: typingRate
          title: ''
          type: Html

        - name: allFreqTable
          title: Allele Frequencies
          type: Table
          visible: (allFreq)
          columns:
            - name: allele
              title: Allele
              type: text
            - name: count
              title: Count
              type: integer
            - name: prop
              title: Proportion
              type: number
              format: zto

        - name: genoFreqTable
          title: Genotype Frequencies
          type: Table
          visible: (genoFreq)
          columns:
            - name: genotype
              title: Genotype
              type: text
            - name: count
              title: Count
              type: integer
            - name: prop
              title: Proportion
              type: number
              format: zto
            - name: responseStat
              title: Response (mean ± SE)
              type: text
              visible: false

        - name: hweTable
          title: Hardy-Weinberg Equilibrium
          type: Table
          visible: (hweTest)
          columns:
            - name: group
              title: Group
              type: text
            - name: n11
              title: N11
              type: integer
            - name: n12
              title: N12
              type: integer
            - name: n22
              title: N22
              type: integer
            - name: n1
              title: N1
              type: integer
            - name: n2
              title: N2
              type: integer
            - name: pval
              title: P-value
              type: number
              format: zto,pvalue

        - name: assocTable
          title: Association with Response
          type: Table
          visible: (snpAssoc)
          columns:
            - name: model
              title: Model
              type: text
            - name: comparison
              title: Comparison
              type: text
            - name: effect
              title: OR / β
              type: number
            - name: ciLow
              title: Lower CI
              type: number
            - name: ciHigh
              title: Upper CI
              type: number
            - name: pval
              title: P-value
              type: number
              format: zto,pvalue
            - name: globalP
              title: Global P
              type: number
              format: zto,pvalue

  # ── LD matrix ──────────────────────────────────────────────────
  - name: ldGroup
    title: Linkage Disequilibrium
    type: Group
    visible: (ldAnalysis)
    items:
      - name: ldTable
        title: Pairwise LD
        type: Table
        columns:
          - name: snp1
            title: SNP 1
            type: text
          - name: snp2
            title: SNP 2
            type: text
          - name: D
            title: D
            type: number
            visible: (ldD)
          - name: Dprime
            title: D'
            type: number
            format: zto
            visible: (ldDprime)
          - name: r
            title: r
            type: number
            visible: (ldR)
          - name: pval
            title: P-value
            type: number
            format: zto,pvalue
            visible: (ldPval)

  # ── Haplotype frequencies ──────────────────────────────────────
  - name: haploGroup
    title: Haplotype Analysis
    type: Group
    visible: (haploFreq || haploAssoc)
    items:
      - name: haploFreqTable
        title: Haplotype Frequencies
        type: Table
        visible: (haploFreq)
        columns:
          - name: haplotype
            title: Haplotype
            type: text
          - name: freq
            title: Frequency
            type: number
            format: zto

      - name: haploAssocTable
        title: Haplotype Association
        type: Table
        visible: (haploAssoc)
        columns:
          - name: haplotype
            title: Haplotype
            type: text
          - name: freq
            title: Frequency
            type: number
            format: zto
          - name: effect
            title: OR / β
            type: number
          - name: ciLow
            title: Lower CI
            type: number
          - name: ciHigh
            title: Upper CI
            type: number
          - name: pval
            title: P-value
            type: number
            format: zto,pvalue
