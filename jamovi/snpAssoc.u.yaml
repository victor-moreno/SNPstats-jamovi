title: SNP Association Analysis
name: snpAssoc
jus: '3.0'
compilerMode: tame
children:
  - type: VariableSupplier
    persistentItems: false
    stretchFactor: 1
    children:
      - type: TargetLayoutBox
        label: Response variable
        children:
          - type: VariablesListBox
            name: response
            maxItemCount: 1
            isTarget: true
      - type: TargetLayoutBox
        label: SNPs
        children:
          - type: VariablesListBox
            name: snps
            isTarget: true
      - type: TargetLayoutBox
        label: Covariates
        children:
          - type: VariablesListBox
            name: covariates
            isTarget: true
  - type: LayoutBox
    margin: large
    children:
      - type: ComboBox
        name: responseType
        enable: (response)
  - type: LayoutBox
    margin: large
    stretchFactor: 1
    children:
      - type: Label
        label: Genetic models
        children:
          - type: CheckBox
            name: snpAssoc
            enable: (response && snps)
            children:
              - type: CheckBox
                name: modelCodominant
                enable: (snpAssoc)
              - type: CheckBox
                name: modelDominant
                enable: (snpAssoc)
              - type: CheckBox
                name: modelRecessive
                enable: (snpAssoc)
              - type: CheckBox
                name: modelOverdominant
                enable: (snpAssoc)
              - type: CheckBox
                name: modelLogAdditive
                enable: (snpAssoc)
              - type: TextBox
                name: ciWidth
                format: number
                enable: (snpAssoc)
          - type: CheckBox
            name: snpInteraction
            enable: (snpAssoc && covariates)
          - type: CheckBox
            name: showAIC
            enable: (snpAssoc)
  - type: LayoutBox
    margin: large
    children:
      - type: CheckBox
        name: subpop
